; PlatformIO Project Configuration File
;
; Each lesson is a self-contained sketch under src/lessons-basic/ with its own
; setup()/loop(). Only ONE lesson is compiled at a time, selected by the
; build_src_filter in its [env:...] block below.
;
;   pio run -e lesson07_toggle -t upload     # flash a specific lesson
;   pio run -e lesson05_melody               # build only
;   pio run                                  # builds default_envs (below)
;
; To add a lesson: drop src/lessons-basic/lessonNN_name.cpp, then add an
; [env:lessonNN_name] block pointing build_src_filter at that file.
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = lesson19_mqtt

; Shared settings inherited by every lesson env.
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

[env:lesson02_traffic_light]
build_src_filter = +<lessons-basic/lesson02_traffic_light.cpp>

[env:lesson03_rgb]
build_src_filter = +<lessons-basic/lesson03_rgb.cpp>

[env:lesson04_buzzer]
build_src_filter = +<lessons-basic/lesson04_buzzer.cpp>

[env:lesson05_melody]
build_src_filter = +<lessons-basic/lesson05_melody.cpp>

[env:lesson06_button]
build_src_filter = +<lessons-basic/lesson06_button.cpp>

[env:lesson07_toggle]
build_src_filter = +<lessons-basic/lesson07_toggle.cpp>

[env:lesson08_sens_module]
build_src_filter = +<lessons-basic/lesson08_sens_module.cpp>

[env:lesson09_ir]
build_src_filter = +<lessons-basic/lesson09_ir.cpp>

[env:lesson10_pot_brightness]
build_src_filter = +<lessons-basic/lesson10_pot_brightness.cpp>

[env:lesson11_ldr_threshold]
build_src_filter = +<lessons-basic/lesson11_ldr_threshold.cpp>

[env:lesson12_dht11]
build_src_filter = +<lessons-basic/lesson12_dht11.cpp>
lib_deps =
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor

[env:lesson13_lcd]
build_src_filter = +<lessons-basic/lesson13_lcd.cpp>
lib_deps =
    arduino-libraries/LiquidCrystal

[env:lesson14_lcddh11]
build_src_filter = +<lessons-basic/lesson14_lcddh11.cpp>
lib_deps =
    adafruit/DHT sensor library
    arduino-libraries/LiquidCrystal

[env:lesson15_relay]
build_src_filter = +<lessons-basic/lesson15_relay.cpp>

[env:lesson16_WiFi]
build_src_filter = +<lessons-basic/lesson16_WiFi.cpp>

[env:lesson17_http_server]
build_src_filter = +<lessons-basic/lesson17_http_server.cpp>
lib_deps = adafruit/DHT sensor library

[env:lesson18_meteostation]
build_src_filter = +<lessons-basic/lesson18_meteostation.cpp>
lib_deps =
    adafruit/DHT sensor library
    arduino-libraries/LiquidCrystal

; ---- Этап 2. IoT Foundation (advanced) ------------------------------------

[env:lesson19_mqtt]
build_src_filter = +<lessons-advance/lesson19_mqtt_telemetry.cpp>
lib_deps =
    knolleary/PubSubClient
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor