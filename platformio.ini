; PlatformIO Project Configuration File
;
; Each lesson is a self-contained sketch under src/lessons/ with its own
; setup()/loop(). Only ONE lesson is compiled at a time, selected by the
; build_src_filter in its [env:...] block below.
;
;   pio run -e lesson07_toggle -t upload     # flash a specific lesson
;   pio run -e lesson05_melody               # build only
;   pio run                                  # builds default_envs (below)
;
; To add a lesson: drop src/lessons/lessonNN_name.cpp, then add an
; [env:lessonNN_name] block pointing build_src_filter at that file.
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = lesson09_ir

; Shared settings inherited by every lesson env.
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

[env:lesson02_traffic_light]
build_src_filter = +<lessons/lesson02_traffic_light.cpp>

[env:lesson03_rgb]
build_src_filter = +<lessons/lesson03_rgb.cpp>

[env:lesson04_buzzer]
build_src_filter = +<lessons/lesson04_buzzer.cpp>

[env:lesson05_melody]
build_src_filter = +<lessons/lesson05_melody.cpp>

[env:lesson06_button]
build_src_filter = +<lessons/lesson06_button.cpp>

[env:lesson07_toggle]
build_src_filter = +<lessons/lesson07_toggle.cpp>

[env:lesson08_sens_module]
build_src_filter = +<lessons/lesson08_sens_module.cpp>

[env:lesson09_ir]
build_src_filter = +<lessons/lesson09_ir.cpp>

[env:lesson10_pot_brightness]
build_src_filter = +<lessons/lesson10_pot_brightness.cpp>

[env:lesson11_ldr_threshold]
build_src_filter = +<lessons/lesson11_ldr_threshold.cpp>

[env:lesson12_dht11]
build_src_filter = +<lessons/lesson12_dht11.cpp>
lib_deps =
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor

